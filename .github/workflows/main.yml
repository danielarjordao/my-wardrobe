name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change to master if your main branch is called master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        # Replace <nome-do-teu-repositorio> with your repo name (e.g., /my-wardrobe/)
        run: npm run build -- --base-href=/<nome-do-teu-repositorio>/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Angular 17+ default output folder format. 
          publish_dir: ./dist/my-wardrobe/browser
