name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build the Angular App
        # ATENÇÃO: Coloca o nome do teu repositório aqui
        run: npm run build -- --base-href=/my-wardrobe/

      - name: Fix index.html and 404 routing for GitHub Pages
        # Este é o truque mágico! Entra na pasta e cria os ficheiros que o GitHub exige
        run: |
          cd ./dist/my-wardrobe/browser
          cp index.csr.html index.html
          cp index.html 404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-wardrobe/browser
