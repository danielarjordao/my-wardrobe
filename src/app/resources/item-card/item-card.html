<div class="item-card" [routerLink]="['/clothes/edit', item.id]">
  <!-- Style background image using inline styles to ensure proper rendering, especially when image URLs are dynamic -->
  <div class="card-image" [style.backgroundImage]="'url(' + item.imageUrl + ')'">
    <span class="status-badge" [ngClass]="getStatusClass(item.status)">
      <span class="dot"></span> {{ item.status }}
    </span>
  </div>
  <div class="card-details">
	<div class="card-title-row">
		<h3>{{ item.name }}</h3>
	</div>
	<p>• {{ item.category }} • {{ item.brand }} • {{ item.price | currency:'EUR' }}</p>
  </div>
</div>
