<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Real-time overview of your wardrobe.</p>
  </header>
<section class="kpi-grid">
    <app-kpi-card
      iconClass="apparel"
      title="Total Items"
      [value]="totalItems">
    </app-kpi-card>
    <app-kpi-card
      iconClass="payments"
      title="Estimated Value"
      [value]="totalValue | currency:'EUR'">
    </app-kpi-card>
    <app-kpi-card
      iconClass="laundry"
      title="In Laundry"
      [value]="itemsInLaundry">
    </app-kpi-card>
  </section>
  <section class="highlight-section">
    @if (mostValue) {
      <div>
        <h2>Most Valuable Item</h2>
        <app-item-card [item]="mostValue"></app-item-card>
      </div>
    }
    @if (mostRecent) {
      <div>
        <h2>Most Recent Item</h2>
        <app-item-card [item]="mostRecent"></app-item-card>
      </div>
    }
    @if (oldest) {
      <div>
        <h2>Oldest Item</h2>
        <app-item-card [item]="oldest"></app-item-card>
      </div>
    }
  </section>
</div>
